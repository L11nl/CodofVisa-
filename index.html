<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مخزون الأكواد</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.card{
background:rgba(15,23,42,0.7);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
box-shadow:
0 10px 30px rgba(0,0,0,0.5),
inset 0 1px 0 rgba(255,255,255,0.05);
width:100%;
max-width:500px;
margin-bottom:20px;
}

textarea{
width:100%;
background:#020617;
border:1px solid #334155;
border-radius:12px;
padding:10px;
color:white;
}

button{
border-radius:12px;
padding:12px;
font-weight:bold;
width:100%;
}

.glow{
box-shadow:0 0 15px rgba(59,130,246,0.6);
}

</style>

</head>

<body>

<h1 class="text-3xl font-bold text-blue-400 mb-6">
مدير مخزون الأكواد
</h1>

<div class="card">

<h2 class="mb-3 text-lg">تغذية الأكواد</h2>

<textarea id="codesInput" rows="6"
placeholder="الصق الأكواد هنا"></textarea>

<div class="flex gap-2 mt-3">

<button id="addCodes"
class="bg-blue-600 hover:bg-blue-500 glow">
إضافة
</button>

<button id="clearStock"
class="bg-red-600">
تصفير
</button>

</div>

<input type="file" id="fileInput" accept=".txt" hidden>

<button id="importBtn"
class="bg-gray-700 mt-3">
استيراد TXT
</button>

</div>


<div class="card">

<h2 class="text-lg mb-3">سحب الأكواد</h2>

<button id="pullOne"
class="bg-green-600 mb-3 glow">
سحب كود
</button>

<input
id="bulkNumber"
type="number"
placeholder="عدد الأكواد"
class="w-full text-black rounded p-2 mb-2">

<button id="pullBulk"
class="bg-purple-600 glow">
سحب بالجملة
</button>

<a href="https://node-card.com/"
target="_blank"
class="block mt-4 text-center text-red-500 text-lg font-bold">
الرابط
</a>

</div>


<div class="card">

<h2 class="mb-3">النتيجة</h2>

<textarea id="result" rows="6"></textarea>

</div>


<div class="card flex justify-between text-lg">

<div>
المخزون
<span id="stockCount">0</span>
</div>

<div>
المسحوب
<span id="pulledCount">0</span>
</div>

</div>


<script>

let stock = JSON.parse(localStorage.getItem("codes_stock") || "[]")
let pulled = Number(localStorage.getItem("codes_pulled") || 0)

const stockCount=document.getElementById("stockCount")
const pulledCount=document.getElementById("pulledCount")
const result=document.getElementById("result")

function updateUI(){

stockCount.textContent=stock.length
pulledCount.textContent=pulled

localStorage.setItem("codes_stock",JSON.stringify(stock))
localStorage.setItem("codes_pulled",pulled)

}

updateUI()


// إضافة الأكواد
document.getElementById("addCodes").onclick=()=>{

let input=document.getElementById("codesInput").value

// تقسيم بالكلمة أو السطر
let codes=input.split(/\s+/)

let added=0

codes.forEach(c=>{

let code=c.trim()

if(code.length>10){

stock.push(code)

added++

}

})

document.getElementById("codesInput").value=""

updateUI()

alert("تم إضافة "+added+" كود")

}



// تصفير
document.getElementById("clearStock").onclick=()=>{

if(!confirm("حذف المخزون؟"))return

stock=[]
pulled=0

updateUI()

}



// سحب كود
document.getElementById("pullOne").onclick=()=>{

if(stock.length==0){

alert("المخزون فارغ")

return

}

let code=stock.shift()

pulled++

result.value=code

updateUI()

}



// سحب بالجملة
document.getElementById("pullBulk").onclick=()=>{

let num=Number(document.getElementById("bulkNumber").value)

if(!num)return

let list=[]

for(let i=0;i<num;i++){

if(stock.length==0)break

list.push(stock.shift())

pulled++

}

result.value=list.join("\n")

updateUI()

}



// استيراد TXT
document.getElementById("importBtn").onclick=()=>{

document.getElementById("fileInput").click()

}

document.getElementById("fileInput").onchange=async(e)=>{

let file=e.target.files[0]

let text=await file.text()

let codes=text.split(/\s+/)

codes.forEach(c=>{

let code=c.trim()

if(code.length>10){

stock.push(code)

}

})

updateUI()

}

</script>

</body>
</html>
