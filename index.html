<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مدير مخزون الأكواد</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.card{
background:rgba(15,23,42,0.8);
border-radius:16px;
padding:18px;
width:100%;
max-width:500px;
margin-bottom:16px;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

textarea{
width:100%;
border-radius:10px;
padding:10px;
border:1px solid #334155;
}

.resultActive{
background:#2563eb;
color:white;
font-family:monospace;
}

.btn{
padding:8px 10px;
border-radius:8px;
font-size:14px;
font-weight:bold;
box-shadow:0 4px 0 rgba(0,0,0,.4);
transition:.15s;
}

.btn:active{
transform:translateY(3px);
box-shadow:0 1px 0 rgba(0,0,0,.4);
}

</style>

</head>

<body>

<h1 class="text-2xl font-bold text-blue-400 mb-4">
مدير مخزون الأكواد
</h1>


<button id="toggleFeed" class="btn bg-blue-600 mb-3 w-full">
تغذية الأكواد
</button>


<div id="feedBox" class="card hidden">

<textarea id="codesInput" rows="5" placeholder="الصق الأكواد"></textarea>

<button id="addCodes" class="btn bg-green-600 mt-2 w-full">
إضافة الأكواد
</button>

<button id="importBtn" class="btn bg-gray-600 mt-2 w-full">
استيراد TXT
</button>

<button id="clearStock" class="btn bg-red-600 mt-2 w-full">
تصفير المخزون
</button>

<input type="file" id="fileInput" hidden>

</div>


<div class="card">

<button id="pullOne" class="btn bg-green-600 w-full mb-2">
سحب كود
</button>

<button id="restoreBtn" class="btn bg-yellow-500 w-full mb-2">
استرداد الكود
</button>

<a href="https://node-card.com/"
target="_blank"
class="block text-center text-red-500 font-bold mt-3">
الرابط
</a>

</div>


<div class="card">

<textarea id="result" rows="4"></textarea>

<button id="copyBtn"
class="btn bg-blue-600 mt-2 hidden w-full">
نسخ
</button>

</div>


<div class="card">

<h2 class="mb-2">الأكواد المسحوبة</h2>

<div id="pulledList" class="text-sm space-y-1 max-h-32 overflow-y-auto"></div>

</div>


<div class="card">

<button id="showBulk" class="btn bg-purple-600 w-full mb-2">
سحب بالجملة
</button>

<div id="bulkBox" class="hidden">

<input id="bulkNumber" type="number"
placeholder="عدد الأكواد"
class="w-full text-black p-2 rounded mb-2">

<button id="pullBulk"
class="btn bg-purple-700 w-full">
سحب
</button>

</div>

</div>


<div class="card flex justify-between text-sm">

<div>
المخزون
<span id="stockCount">0</span>
</div>

<div>
المسحوب
<span id="pulledCount">0</span>
</div>

</div>


<script>

let stock = JSON.parse(localStorage.getItem("codes_stock")||"[]")
let pulled = JSON.parse(localStorage.getItem("codes_pulled_list")||"[]")
let pulledCounter = Number(localStorage.getItem("codes_pulled")||0)

const stockCount=document.getElementById("stockCount")
const pulledCount=document.getElementById("pulledCount")
const pulledList=document.getElementById("pulledList")
const result=document.getElementById("result")
const copyBtn=document.getElementById("copyBtn")

function save(){

localStorage.setItem("codes_stock",JSON.stringify(stock))
localStorage.setItem("codes_pulled_list",JSON.stringify(pulled))
localStorage.setItem("codes_pulled",pulledCounter)

}

function updateUI(){

stockCount.textContent=stock.length
pulledCount.textContent=pulledCounter

pulledList.innerHTML=""

pulled.slice().reverse().forEach((c,i)=>{

let div=document.createElement("div")

div.className="flex justify-between"

div.innerHTML=`
<span>${c}</span>
<button onclick="restoreFromList('${c}')"
class="text-yellow-400 text-xs">
استرجاع
</button>
`

pulledList.appendChild(div)

})

save()

}

updateUI()


// اظهار التغذية

let timer=null

toggleFeed.onclick=()=>{

feedBox.classList.remove("hidden")

clearTimeout(timer)

timer=setTimeout(()=>{
feedBox.classList.add("hidden")
},180000)

}



// إضافة

addCodes.onclick=()=>{

let input=codesInput.value

let codes=input.split(/\s+/)

codes.forEach(c=>{

if(c.length>10) stock.push(c)

})

codesInput.value=""

updateUI()

}



// استيراد

importBtn.onclick=()=>fileInput.click()

fileInput.onchange=async(e)=>{

let text=await e.target.files[0].text()

let codes=text.split(/\s+/)

codes.forEach(c=>{
if(c.length>10) stock.push(c)
})

updateUI()

}



// تصفير

clearStock.onclick=()=>{

if(!confirm("تصفير المخزون؟")) return

stock=[]
pulled=[]
pulledCounter=0

result.value=""

copyBtn.classList.add("hidden")

updateUI()

}



// سحب كود

pullOne.onclick=()=>{

if(stock.length==0) return

let code=stock.shift()

pulled.push(code)

pulledCounter++

result.value=code

result.classList.add("resultActive")

copyBtn.textContent="نسخ الكود"
copyBtn.classList.remove("hidden")

updateUI()

}



// استرداد آخر كود

restoreBtn.onclick=()=>{

let code=pulled.pop()

if(!code) return

stock.unshift(code)

pulledCounter--

updateUI()

}



// استرجاع من القائمة

function restoreFromList(code){

stock.unshift(code)

pulled = pulled.filter(c=>c!==code)

pulledCounter--

updateUI()

}



// سحب بالجملة

showBulk.onclick=()=>bulkBox.classList.toggle("hidden")

pullBulk.onclick=()=>{

let num=Number(bulkNumber.value)

if(!num) return

let list=[]

for(let i=0;i<num;i++){

if(stock.length==0) break

let code=stock.shift()

pulled.push(code)

list.push((i+1)+"- "+code)

pulledCounter++

}

result.value=list.join("\n")

result.classList.add("resultActive")

copyBtn.textContent="نسخ الأكواد"
copyBtn.classList.remove("hidden")

updateUI()

}



// نسخ

copyBtn.onclick=()=>{

navigator.clipboard.writeText(result.value)

copyBtn.textContent="تم النسخ ✓"

setTimeout(()=>{
copyBtn.textContent = result.value.includes("\n")
? "نسخ الأكواد"
: "نسخ الكود"
},1500)

}

</script>

</body>
</html>
