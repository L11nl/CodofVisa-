<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مخزون الأكواد</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.card{
background:rgba(15,23,42,0.7);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
width:100%;
max-width:500px;
margin-bottom:20px;
}

textarea{
width:100%;
background:#020617;
border:1px solid #334155;
border-radius:12px;
padding:10px;
color:white;
}

button{
border-radius:12px;
padding:12px;
font-weight:bold;
width:100%;
}

.glow{
box-shadow:0 0 15px rgba(59,130,246,0.6);
}

</style>

</head>

<body>

<h1 class="text-3xl font-bold text-blue-400 mb-6">
مدير مخزون الأكواد
</h1>


<button id="toggleFeed"
class="bg-blue-600 glow mb-4">
تغذية الأكواد
</button>


<div id="feedBox" class="card hidden">

<textarea id="codesInput" rows="6"
placeholder="الصق الأكواد هنا"></textarea>

<button id="addCodes"
class="bg-green-600 mt-3 glow">
إضافة الأكواد
</button>

<button id="importBtn"
class="bg-gray-700 mt-2">
استيراد TXT
</button>

<input type="file" id="fileInput" hidden accept=".txt">

</div>



<div class="card">

<button id="pullOne"
class="bg-green-600 glow mb-3">
سحب كود
</button>

<button id="copyOne"
class="bg-blue-600 mb-4 hidden">
نسخ الكود
</button>


<button id="showBulk"
class="bg-purple-600 glow">
سحب بالجملة
</button>

<div id="bulkBox" class="hidden mt-3">

<input
id="bulkNumber"
type="number"
placeholder="عدد الأكواد"
class="w-full text-black rounded p-2 mb-2">

<button id="pullBulk"
class="bg-purple-700">
سحب
</button>

<button id="copyBulk"
class="bg-blue-600 mt-2 hidden">
نسخ الأكواد
</button>

</div>

<a href="https://node-card.com/"
target="_blank"
class="block mt-5 text-center text-red-500 text-lg font-bold">
الرابط
</a>

</div>



<div class="card">

<textarea id="result" rows="6"></textarea>

</div>



<div class="card flex justify-between text-lg">

<div>
المخزون
<span id="stockCount">0</span>
</div>

<div>
المسحوب
<span id="pulledCount">0</span>
</div>

</div>



<script>

let stock = JSON.parse(localStorage.getItem("codes_stock") || "[]")
let pulled = Number(localStorage.getItem("codes_pulled") || 0)

const stockCount=document.getElementById("stockCount")
const pulledCount=document.getElementById("pulledCount")
const result=document.getElementById("result")

function updateUI(){

stockCount.textContent=stock.length
pulledCount.textContent=pulled

localStorage.setItem("codes_stock",JSON.stringify(stock))
localStorage.setItem("codes_pulled",pulled)

}

updateUI()



// زر اظهار التغذية
let feedTimer=null

document.getElementById("toggleFeed").onclick=()=>{

const box=document.getElementById("feedBox")

box.classList.remove("hidden")

clearTimeout(feedTimer)

feedTimer=setTimeout(()=>{

box.classList.add("hidden")

},180000)

}



// إضافة الأكواد
document.getElementById("addCodes").onclick=()=>{

let input=document.getElementById("codesInput").value

let codes=input.split(/\s+/)

let added=0

codes.forEach(c=>{

let code=c.trim()

if(code.length>10){

stock.push(code)

added++

}

})

document.getElementById("codesInput").value=""

updateUI()

alert("تم إضافة "+added+" كود")

}



// استيراد TXT
document.getElementById("importBtn").onclick=()=>{

document.getElementById("fileInput").click()

}

document.getElementById("fileInput").onchange=async(e)=>{

let file=e.target.files[0]

let text=await file.text()

let codes=text.split(/\s+/)

codes.forEach(c=>{

let code=c.trim()

if(code.length>10){

stock.push(code)

}

})

updateUI()

}



// سحب كود
document.getElementById("pullOne").onclick=()=>{

if(stock.length==0){

alert("المخزون فارغ")

return

}

let code=stock.shift()

pulled++

result.value=code

updateUI()

document.getElementById("copyOne").classList.remove("hidden")

}



// نسخ كود
document.getElementById("copyOne").onclick=()=>{

navigator.clipboard.writeText(result.value)

alert("تم النسخ")

}



// اظهار السحب بالجملة
document.getElementById("showBulk").onclick=()=>{

document.getElementById("bulkBox").classList.toggle("hidden")

}



// سحب بالجملة
document.getElementById("pullBulk").onclick=()=>{

let num=Number(document.getElementById("bulkNumber").value)

if(!num)return

let list=[]

for(let i=0;i<num;i++){

if(stock.length==0)break

list.push((i+1)+"- "+stock.shift())

pulled++

}

result.value=list.join("\n")

updateUI()

document.getElementById("copyBulk").classList.remove("hidden")

}



// نسخ بالجملة
document.getElementById("copyBulk").onclick=()=>{

navigator.clipboard.writeText(result.value)

alert("تم النسخ")

}

</script>

</body>
</html>
